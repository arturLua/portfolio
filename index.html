<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artur Rebeschini</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

  <script>
    /* Aplica o tema ANTES de renderizar para evitar flash */
    (function () {
      const salvo = localStorage.getItem('tema');
      if (salvo === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  
</head>

<body>

  <!-- Botão de alternar entre modo dark / light -->
  <button class="btn-tema" id="btn-tema" aria-label="Alternar tema" title="Alternar tema">

    <!-- Sol: visível no modo escuro -->
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
         viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1"  x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1"  y1="12" x2="3"  y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>

    <!-- Lua: visível no modo claro -->
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
         viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="grid">

    <aside class="col-esq">

      <div class="identidade">
        <h1 class="nome">
          Artur<br /><span class="nome--acento">Rebeschini</span>
        </h1>
      </div>

      <div class="sobre">
        <p class="sobre__texto">
          Tech student currently focusing on
          <span class="tag">Networks</span>,
          <span class="tag">Cybersecurity</span> and
          <span class="tag">Linux</span>.
        </p>
      </div>

      <nav class="contato">
        <a href="mailto:arturrendereco@gmail.com" class="contato__link">
          arturrendereco@gmail.com
        </a>
        <a href="https://www.linkedin.com/in/artur-rebeschini-18794b311/" target="_blank" rel="noopener" class="contato__link">
          linkedin
        </a>
        <a href="https://github.com/arturLua" target="_blank" rel="noopener" class="contato__link contato__link--acento">
          github ↗
        </a>
      </nav>

      <span class="rodape-ano"><span id="year"></span></span>

    </aside>



    <main class="col-dir">

      <div class="repos-header">
        <span class="repos-titulo">repositories</span>
        <!-- Ponto piscante indica que está carregando / ao vivo -->
        <span class="repos-live" id="live-indicator" aria-hidden="true"></span>
      </div>

      <!-- Cards de repositório são injetados aqui pelo script.js -->
        
      <div class="repos-grid" id="repos-grid">
        <div class="repo-skeleton"></div>
        <div class="repo-skeleton"></div>
        <div class="repo-skeleton"></div>
        <div class="repo-skeleton"></div>
      </div>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
